# Cloud Dimensions - ServiceNow CI/CD lab pipeline
# Branch: main  (Lab 4 / Lesson 8 - Run an ATF Suite and Instance Scan in a Pipeline)
# Completed state: full pipeline - apply changes, ATF test suite step, instance scan step,
# each with its own step-level env block.
name: CICD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      nowUsername: ${{ secrets.SN_USERNAME }}
      nowPassword: ${{ secrets.SN_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply changes
        uses: ServiceNow/sncicd-apply-changes@2.0.0
        continue-on-error: true
        env:
          nowSourceInstance: ${{ secrets.SN_INSTANCE_DOMAIN }}
          appScope: x_cd_grc_app

      - name: Run ATF test suite
        uses: ServiceNow/sncicd-tests-run@2.0.0
        with:
          testSuiteSysId: 90f283440db503107f44aad64471050b
        env:
          nowInstallInstance: ${{ secrets.SN_INSTANCE_DOMAIN }}

      - name: Run Instance Scan
        uses: ServiceNow/sncicd-instance-scan@2.0.0
        with:
          scantype: suite_scoped
          suiteSysId: 6237eabc53203010b846ddeeff7b12c3
          appScopeSysIds: 7f0cfe480d7503107f44aad6447105bd
        env:
          nowScanInstance: ${{ secrets.SN_INSTANCE_DOMAIN }}
